<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Carretero | Sabor & Descanso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #050505; color: white; }
        
        /* CAMBIO AQUÍ: Se cambió la imagen por la tuya y se ajustó el centrado */
        .hero-gradient { 
            background: linear-gradient(rgba(0,0,0,0.65), rgba(5,5,5,1)), url('comida-hero.jpg'); 
            background-size: cover; 
            background-position: center 30%; /* Ajustado para que el sándwich se vea mejor */
            background-repeat: no-repeat;
        }

        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-hover:hover { transform: translateY(-10px); transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(220, 38, 38, 0.3); }
        .neon-text { text-shadow: 0 0 10px rgba(234, 88, 12, 0.8); }
        .radio-card input:checked + .radio-content { border-color: #ea580c; background: rgba(234, 88, 12, 0.1); }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <nav class="fixed w-full z-50 glass px-6 py-0 flex justify-between items-center backdrop-blur-md overflow-visible">
        <div class="flex items-center overflow-visible">
          <img src="logo-carretero.png" alt="Logo El Carretero"
            class="h-24 w-24 md:h-32 md:w-32 rounded-full object-contain -mb-8 drop-shadow-[0_0_25px_rgba(234,88,12,0.85)] ring-4 ring-orange-500/20 hover:scale-105 transition duration-300 cursor-pointer"
            onclick="window.location.href='#inicio'">
        </div>
        <div class="hidden md:flex space-x-8 font-medium">
          <a href="#inicio" class="hover:text-orange-500 transition">Inicio</a>
          <a href="#promos" class="hover:text-orange-500 transition">Promos</a>
          <a href="#menu" class="hover:text-orange-500 transition">Menú</a>
          <a href="#nosotros" class="hover:text-orange-500 transition">Nosotros</a>
        </div>
        <div class="flex items-center space-x-4">
          <button onclick="toggleCart()" class="relative p-2 bg-orange-600 rounded-full hover:bg-red-700 transition">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
          </button>
        </div>
    </nav>

    <!-- HERO (Utiliza la nueva imagen de fondo) -->
    <header id="inicio" class="h-screen flex items-center justify-center text-center px-4 hero-gradient">
        <div class="max-w-4xl">
            <h1 class="text-5xl md:text-7xl font-800 mb-6 uppercase tracking-tight">El mejor lugar para <span class="text-orange-500 neon-text">comer, tomar algo</span> y descansar.</h1>
            <p class="text-gray-300 text-xl mb-8">Abierto toda la noche para el viajero que sabe elegir lo mejor.</p>
            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <a href="#menu" class="bg-red-600 hover:bg-red-700 text-white px-10 py-4 rounded-full font-bold text-lg transition shadow-lg">VER MENÚ</a>
                <a href="https://wa.me/5493772303777" class="bg-transparent border-2 border-orange-500 text-orange-500 hover:bg-orange-500 hover:text-white px-10 py-4 rounded-full font-bold text-lg transition">PEDIR AHORA</a>
            </div>
        </div>
    </header>

    <!-- Resto del código se mantiene igual... -->
